<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Taxeling Open House Showcase</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #111;
      }

      body {
        display: grid;
        place-items: center;
      }

      canvas {
        width: min(100vw, 177.777vh);
        height: min(56.25vw, 100vh);
        display: block;
        background: #343434;
      }
    </style>
  </head>
  <body>
    <canvas id="showcase" width="1920" height="1080"></canvas>
    <script>
      const canvas = document.getElementById('showcase');
      const ctx = canvas.getContext('2d');
      const W = canvas.width;
      const H = canvas.height;
      const palette = {
        bg: '#343434',
        navy: '#2F3061',
        blue: '#6CA6C1',
        yellow: '#FFE66D',
        off: '#F7FFF7',
        muted: 'rgba(247,255,247,0.58)',
        card: 'rgba(47,48,97,0.92)',
        dark: 'rgba(20,20,24,0.78)',
      };

      const rows = [
        ['A. Santoso', 'TETAP', 'GROSS', '18.500.000', '934.500', '14.825.000'],
        ['M. Rahayu', 'TETAP', 'NET', '21.200.000', '0', '18.940.000'],
        ['R. Wijaya', 'NON', 'GROSS_UP', '9.750.000', '488.000', '9.750.000'],
        ['D. Pratama', 'TETAP', 'GROSS', '16.300.000', '771.000', '13.560.000'],
      ];

      const recon = [
        ['A. Santoso', 'BERUBAH', '+Rp 2.300.000', '+Rp 116.000', '+Rp 1.820.000'],
        ['M. Rahayu', 'TETAP', 'Rp 0', 'Rp 0', 'Rp 0'],
        ['N. Putri', 'BARU', '+Rp 12.000.000', '+Rp 450.000', '+Rp 10.840.000'],
        ['D. Pratama', 'KELUAR', '-Rp 16.300.000', '-Rp 771.000', '-Rp 13.560.000'],
      ];

      function clamp(v, min = 0, max = 1) {
        return Math.min(max, Math.max(min, v));
      }

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - clamp(t), 3);
      }

      function easeInOut(t) {
        t = clamp(t);
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      function sceneProgress(time, start, end) {
        return clamp((time - start) / (end - start));
      }

      function setFont(size, weight = 700) {
        ctx.font = `${weight} ${size}px ui-monospace, SFMono-Regular, Consolas, monospace`;
      }

      function rect(x, y, w, h, r, fill, stroke, line = 2) {
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, r);
        ctx.fillStyle = fill;
        ctx.fill();
        if (stroke) {
          ctx.lineWidth = line;
          ctx.strokeStyle = stroke;
          ctx.stroke();
        }
      }

      function text(value, x, y, size, color = palette.off, weight = 700, align = 'left') {
        setFont(size, weight);
        ctx.textAlign = align;
        ctx.textBaseline = 'top';
        ctx.fillStyle = color;
        ctx.fillText(value, x, y);
      }

      function subtitle(value, x, y, width, lineHeight = 34) {
        setFont(26, 600);
        ctx.fillStyle = palette.muted;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        const words = value.split(' ');
        let line = '';
        let yy = y;
        for (const word of words) {
          const test = `${line}${word} `;
          if (ctx.measureText(test).width > width && line) {
            ctx.fillText(line.trim(), x, yy);
            line = `${word} `;
            yy += lineHeight;
          } else {
            line = test;
          }
        }
        ctx.fillText(line.trim(), x, yy);
      }

      function pill(value, x, y, color = palette.blue, width) {
        setFont(18, 900);
        const w = width || ctx.measureText(value).width + 36;
        rect(x, y, w, 38, 19, `${color}22`, `${color}88`, 2);
        text(value, x + 18, y + 10, 16, color, 900);
      }

      function metric(label, value, x, y, w = 285, color = palette.off) {
        rect(x, y, w, 132, 22, 'rgba(20,20,24,0.68)', 'rgba(108,166,193,0.28)');
        text(label, x + 24, y + 24, 17, 'rgba(247,255,247,0.45)', 900);
        text(value, x + 24, y + 62, 34, color, 900);
      }

      function drawBackground(time) {
        ctx.fillStyle = palette.bg;
        ctx.fillRect(0, 0, W, H);
        const gradient = ctx.createRadialGradient(1500, 80, 10, 1500, 80, 900);
        gradient.addColorStop(0, 'rgba(108,166,193,0.22)');
        gradient.addColorStop(0.45, 'rgba(47,48,97,0.4)');
        gradient.addColorStop(1, 'rgba(52,52,52,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, W, H);

        ctx.save();
        ctx.globalAlpha = 0.18;
        ctx.strokeStyle = palette.blue;
        ctx.lineWidth = 1;
        for (let i = -200; i < W + 200; i += 80) {
          const offset = (time * 18) % 80;
          ctx.beginPath();
          ctx.moveTo(i + offset, 0);
          ctx.lineTo(i - 420 + offset, H);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawBrowserFrame(x, y, w, h, scale = 1) {
        rect(x, y, w, h, 28 * scale, palette.card, 'rgba(108,166,193,0.38)', 3);
        rect(x, y, w, 68 * scale, 28 * scale, 'rgba(20,20,24,0.62)', null);
        ctx.fillStyle = palette.yellow;
        ctx.beginPath();
        ctx.arc(x + 38 * scale, y + 34 * scale, 9 * scale, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = palette.blue;
        ctx.beginPath();
        ctx.arc(x + 68 * scale, y + 34 * scale, 9 * scale, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = palette.off;
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.arc(x + 98 * scale, y + 34 * scale, 9 * scale, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        rect(x + 140 * scale, y + 19 * scale, 380 * scale, 30 * scale, 15 * scale, 'rgba(247,255,247,0.08)', null);
        text('payroll-coretax.local', x + 162 * scale, y + 26 * scale, 14 * scale, 'rgba(247,255,247,0.52)', 700);
      }

      function drawLoginMock(x, y, w, h, p) {
        drawBrowserFrame(x, y, w, h);
        text('Taxeling', x + 70, y + 125, 70, palette.yellow, 1000);
        subtitle('Internal payroll workspace untuk PPh 21/26, BPJS, slip gaji, histori, dan XML BPMP.', x + 72, y + 220, 620);
        rect(x + 1120, y + 136, 420, 420, 28, 'rgba(247,255,247,0.92)', null);
        text('Secure Login', x + 1170, y + 190, 34, palette.navy, 1000);
        rect(x + 1170, y + 270, 320, 52, 14, 'rgba(47,48,97,0.08)', 'rgba(47,48,97,0.18)');
        text('user@company.com', x + 1190, y + 286, 20, palette.navy, 700);
        rect(x + 1170, y + 346, 320, 52, 14, 'rgba(47,48,97,0.08)', 'rgba(47,48,97,0.18)');
        text('••••••••••', x + 1190, y + 362, 22, palette.navy, 700);
        rect(x + 1170, y + 430, 320, 62, 18, palette.yellow, null);
        text('MASUK', x + 1330, y + 450, 22, palette.bg, 1000, 'center');
        const scan = y + 130 + easeInOut(p) * 440;
        ctx.strokeStyle = palette.blue;
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(x + 1118, scan);
        ctx.lineTo(x + 1542, scan);
        ctx.stroke();
      }

      function drawBulkMock(x, y, w, h, p) {
        drawBrowserFrame(x, y, w, h);
        text('Bulk Payroll Matrix', x + 64, y + 104, 42, palette.yellow, 1000);
        pill('Import Excel', x + 64, y + 168, palette.blue, 180);
        pill('Recalculate', x + 260, y + 168, palette.yellow, 180);
        pill('Finalize / Lock', x + 456, y + 168, palette.yellow, 220);
        metric('Total Bruto', 'Rp 612.450.000', x + 64, y + 236, 310);
        metric('Total Pajak', 'Rp 26.480.000', x + 400, y + 236, 310, palette.yellow);
        metric('Total THP', 'Rp 512.990.000', x + 736, y + 236, 310, palette.blue);
        rect(x + 64, y + 410, w - 128, 360, 24, 'rgba(20,20,24,0.65)', 'rgba(108,166,193,0.22)');
        ['Nama', 'Tipe', 'Metode', 'Bruto', 'Pajak', 'THP'].forEach((h2, idx) => {
          text(h2, x + 104 + idx * 240, y + 440, 17, 'rgba(247,255,247,0.46)', 900);
        });
        rows.forEach((row, ridx) => {
          const yy = y + 500 + ridx * 62;
          rect(x + 86, yy - 14, w - 172, 50, 16, ridx === Math.floor(p * 4) ? 'rgba(108,166,193,0.14)' : 'rgba(247,255,247,0.03)', null);
          row.forEach((cell, cidx) => {
            const color = cidx === 4 ? palette.yellow : cidx === 5 ? palette.blue : palette.off;
            text(cell, x + 104 + cidx * 240, yy, 19, color, cidx > 2 ? 900 : 700);
          });
        });
      }

      function drawHistoryMock(x, y, w, h, p) {
        drawBrowserFrame(x, y, w, h);
        text('Histori Periode Payroll', x + 64, y + 108, 42, palette.yellow, 1000);
        metric('Karyawan', '38', x + 64, y + 184, 230);
        metric('Total Pajak', 'Rp 26.480.000', x + 320, y + 184, 320, palette.yellow);
        metric('Total THP', 'Rp 512.990.000', x + 666, y + 184, 320, palette.blue);
        rect(x + 1030, y + 184, 330, 132, 22, 'rgba(255,230,109,0.12)', 'rgba(255,230,109,0.36)');
        text('LOCKED', x + 1060, y + 230, 42, palette.yellow, 1000);
        rect(x + 64, y + 370, 760, 410, 28, 'rgba(20,20,24,0.66)', 'rgba(108,166,193,0.25)');
        text('Detail Hitungan', x + 104, y + 410, 28, palette.blue, 1000);
        ['Membaca profil pajak', 'Menghitung BPJS', 'Menghitung bruto pajak', 'Metode pajak GROSS', 'Menghitung THP'].forEach((step, idx) => {
          const yy = y + 468 + idx * 58;
          pill(`STEP ${idx + 1}`, x + 104, yy, palette.blue, 110);
          text(step, x + 240, yy + 7, 20, palette.off, 800);
        });
        const slide = easeOutCubic(p);
        rect(x + w - 520 + (1 - slide) * 560, y + 78, 470, h - 116, 28, palette.navy, 'rgba(108,166,193,0.34)', 3);
        text('Export Snapshot', x + w - 470 + (1 - slide) * 560, y + 126, 31, palette.yellow, 1000);
        pill('XML BPMP', x + w - 470 + (1 - slide) * 560, y + 204, palette.blue, 170);
        pill('Semua Slip ZIP', x + w - 270 + (1 - slide) * 560, y + 204, palette.yellow, 230);
        pill('Slip PDF', x + w - 470 + (1 - slide) * 560, y + 274, palette.blue, 150);
      }

      function drawReconciliationMock(x, y, w, h, p) {
        drawBrowserFrame(x, y, w, h);
        text('Compare / Reconciliation', x + 64, y + 105, 42, palette.yellow, 1000);
        subtitle('Bandingkan masa ini vs bulan lalu sebelum laporan: bruto, pajak, THP, karyawan baru dan keluar.', x + 66, y + 166, 780);
        metric('Delta Bruto', '+Rp 42.850.000', x + 64, y + 260, 330, palette.blue);
        metric('Delta Pajak', '+Rp 2.105.000', x + 420, y + 260, 330, palette.yellow);
        metric('Baru / Keluar', '3 / 1', x + 776, y + 260, 260, palette.off);
        rect(x + 64, y + 445, w - 128, 300, 24, 'rgba(20,20,24,0.66)', 'rgba(108,166,193,0.24)');
        ['Karyawan', 'Status', 'Delta Bruto', 'Delta Pajak', 'Delta THP'].forEach((h2, idx) => {
          text(h2, x + 104 + idx * 290, y + 474, 17, 'rgba(247,255,247,0.48)', 900);
        });
        recon.forEach((row, ridx) => {
          const yy = y + 532 + ridx * 56;
          const visible = easeOutCubic(p * 1.35 - ridx * 0.16);
          ctx.save();
          ctx.globalAlpha = visible;
          rect(x + 86, yy - 12 + (1 - visible) * 28, w - 172, 45, 14, 'rgba(247,255,247,0.04)', null);
          row.forEach((cell, cidx) => {
            const color = cell.includes('+') ? palette.blue : cell.includes('-') ? '#ffd5d5' : cidx === 1 ? palette.yellow : palette.off;
            text(cell, x + 104 + cidx * 290, yy + (1 - visible) * 28, 18, color, cidx === 1 ? 1000 : 800);
          });
          ctx.restore();
        });
      }

      function drawCursor(x, y, p) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(-0.2);
        ctx.fillStyle = palette.off;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(36, 80);
        ctx.lineTo(49, 45);
        ctx.lineTo(88, 42);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = palette.navy;
        ctx.lineWidth = 4;
        ctx.stroke();
        if (p > 0.75) {
          ctx.globalAlpha = 1 - (p - 0.75) / 0.25;
          ctx.strokeStyle = palette.yellow;
          ctx.lineWidth = 6;
          ctx.beginPath();
          ctx.arc(45, 42, 56 * ((p - 0.75) / 0.25), 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      function draw(time) {
        drawBackground(time);
        const t = time;
        const intro = sceneProgress(t, 0, 4.2);
        const login = sceneProgress(t, 3.4, 8.7);
        const bulk = sceneProgress(t, 8.0, 14.6);
        const history = sceneProgress(t, 14.0, 21.0);
        const reconciliation = sceneProgress(t, 20.2, 26.6);
        const closing = sceneProgress(t, 25.7, 30.0);

        if (t < 4.6) {
          const p = easeOutCubic(intro);
          text('Taxeling', 120, 168 - (1 - p) * 70, 98, palette.yellow, 1000);
          text('Payroll Coretax Workspace', 124, 284 - (1 - p) * 58, 46, palette.off, 900);
          subtitle('Dari import Excel sampai audit histori, finalize, slip gaji, dan XML BPMP.', 128, 360, 780);
          pill('PPh 21 / 26', 130, 510, palette.blue, 170);
          pill('BPJS', 320, 510, palette.yellow, 110);
          pill('Audit Trail', 450, 510, palette.blue, 170);
          pill('Export Ready', 640, 510, palette.yellow, 190);
          drawBrowserFrame(1080 - p * 160, 175, 660, 520);
        }

        if (t >= 3.2 && t < 9) {
          const alpha = clamp((t - 3.2) / 0.6) * (1 - clamp((t - 8.6) / 0.5));
          ctx.save();
          ctx.globalAlpha = alpha;
          drawLoginMock(180, 130, 1560, 790, login);
          drawCursor(1330, 450, login);
          ctx.restore();
        }

        if (t >= 8 && t < 15) {
          const alpha = clamp((t - 8) / 0.6) * (1 - clamp((t - 14.5) / 0.5));
          ctx.save();
          ctx.globalAlpha = alpha;
          drawBulkMock(135, 105, 1650, 850, bulk);
          drawCursor(510 + bulk * 250, 205, bulk);
          ctx.restore();
        }

        if (t >= 14 && t < 21.4) {
          const alpha = clamp((t - 14) / 0.6) * (1 - clamp((t - 21) / 0.5));
          ctx.save();
          ctx.globalAlpha = alpha;
          drawHistoryMock(135, 105, 1650, 850, history);
          drawCursor(1230, 335, history);
          ctx.restore();
        }

        if (t >= 20.2 && t < 27) {
          const alpha = clamp((t - 20.2) / 0.6) * (1 - clamp((t - 26.6) / 0.6));
          ctx.save();
          ctx.globalAlpha = alpha;
          drawReconciliationMock(135, 105, 1650, 850, reconciliation);
          ctx.restore();
        }

        if (t >= 25.7) {
          const p = easeOutCubic(closing);
          text('Siap Dipresentasikan', 960, 250 - (1 - p) * 50, 74, palette.yellow, 1000, 'center');
          text('Open House Project Booth', 960, 350 - (1 - p) * 42, 44, palette.off, 900, 'center');
          subtitle('Payroll lebih cepat ditinjau, lebih mudah diaudit, dan siap export untuk pelaporan.', 625, 430, 700);
          rect(700, 610, 520, 78, 24, palette.yellow, null);
          text('LIHAT DEMO LANGSUNG', 960, 632, 27, palette.bg, 1000, 'center');
        }
      }

      let startTime = performance.now();
      function loop(now) {
        const t = (now - startTime) / 1000;
        draw(Math.min(t, 30));
        if (t < 30.2) requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);

      window.restartShowcase = () => {
        startTime = performance.now();
      };
    </script>
  </body>
</html>
